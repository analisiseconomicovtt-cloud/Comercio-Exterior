[workspace]
channels = ["conda-forge"]
name = "comercio_exterior_bienes"
platforms = ["linux-64"]
version = "0.1.0"
preview = ["pixi-build"]

[tasks]

[tasks.install_r_this_path]
cmd = "Rscript install_r_packages.R"

[dependencies]

# --- R Base and Data Engines ---
"r-base" = ">=4.5.2,<4.6"
"r-data.table" = "*"
"r-arrow" = "*"

# --- System Utilities & Bridges ---
"r-fs" = "*"
"r-logger" = "*"
"r-here" = "*"
"r-reticulate" = "*"

# --- Tidyverse & Data Manipulation ---
"r-tidyverse" = ">=2.0.0,<3"
"r-lubridate" = "*"
"r-zoo" = "*"
"r-purrr" = "*"
"r-vroom" = "*"

# --- File Formats ---
"r-readxl" = "*"
"r-haven" = "*"
"r-openxlsx" = "*"
"r-writexl" = "*"

# --- Visualization & Dashboards ---
"r-dt" = "*"
"r-plotly" = "*"
"r-ggrepel" = "*"
"r-patchwork" = "*"
"r-scales" = "*"
"r-shiny" = "*"
"r-gt" = "*"
"r-gtextras" = ">=0.6.2,<0.7"
"r-webshot2" = ">=0.1.2,<0.2"
"r-knitr" = ">=1.51,<2"
"r-rmarkdown" = ">=2.30,<3"
"r-treemapify" = "*"

quarto = ">=1.8.27,<2"

# --- Python Stack ---
python = ">=3.11,<3.12"
pip = "*"
plotly = ">=6.6.0,<7"
python-kaleido = "==0.2.1"

# --- Build Tools ---
make = ">=4.4.1,<5"
cmake = ">=4.2.3,<5"
compilers = "*"
pkg-config = ">=0.29.2,<0.30"
r-quarto = ">=1.5.1,<2"
r-duckdb = ">=1.5.2,<2"
r-dbi = ">=1.3.0,<2"
r-flextable = ">=0.9.11,<0.10"
r-officer = ">=0.7.5,<0.8"
r-openxlsx2 = ">=1.27,<2"
r-htmlwidgets = ">=1.6.4,<2"
r-magick = ">=2.9.1,<3"
r-zip = ">=2.3.3,<3"
r-png = ">=0.1_9,<0.2"
